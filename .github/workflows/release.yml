name: Build & Release Mac Installer

# Triggered manually (workflow_dispatch) or by repository_dispatch from
# the main devshot repo's build-agent workflow after a v* tag.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0)'
        required: true
        default: '0.1.0'
      devshot_ref:
        description: 'Git ref of devshotcom/devshot to build from'
        required: true
        default: 'main'
      docker_image:
        description: 'Docker image to extract kernel + guest base from'
        required: true
        default: 'anticipatercom/devshot:arm64'
  repository_dispatch:
    types: [release-mac]

permissions:
  contents: write  # create releases + push formula updates

jobs:
  build-and-release:
    runs-on: macos-14  # Apple Silicon runner (M1/M2)
    steps:
      - name: Resolve inputs
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "version=${{ github.event.client_payload.version }}" >> $GITHUB_OUTPUT
            echo "devshot_ref=${{ github.event.client_payload.ref || 'main' }}" >> $GITHUB_OUTPUT
            echo "docker_image=${{ github.event.client_payload.docker_image || 'anticipatercom/devshot:arm64' }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "devshot_ref=${{ inputs.devshot_ref }}" >> $GITHUB_OUTPUT
            echo "docker_image=${{ inputs.docker_image }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4

      - name: Checkout devshot source
        uses: actions/checkout@v4
        with:
          repository: devshotcom/devshot
          ref: ${{ steps.vars.outputs.devshot_ref }}
          path: devshot
          token: ${{ secrets.DEVSHOT_PAT }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build darwin/arm64 agent
        run: |
          cd devshot/apps/agent/go
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o devshot-agent .
          ls -lh devshot-agent

      - name: Install Docker (for artifact extraction)
        run: |
          brew install --cask docker
          # Start Docker Desktop and wait for it
          open -a Docker
          for i in $(seq 1 60); do
            docker info >/dev/null 2>&1 && break
            sleep 2
          done
          docker info >/dev/null 2>&1 || { echo "Docker did not start"; exit 1; }

      - name: Extract kernel + guest base from Docker image
        run: |
          docker pull ${{ steps.vars.outputs.docker_image }}
          CID=$(docker create ${{ steps.vars.outputs.docker_image }})
          docker cp "$CID:/xen/boot/Image-domu" ./Image-domu 2>/dev/null \
            || docker cp "$CID:/xen/Image" ./Image-domu  # fallback name
          docker cp "$CID:/xen/devshot-guest-base.qcow2" ./devshot-guest-base.qcow2
          docker rm "$CID"
          ls -lh Image-domu devshot-guest-base.qcow2

      - name: Package tarball
        run: |
          VERSION=${{ steps.vars.outputs.version }}
          TARBALL="devshot-macos-arm64-qemu.tar.gz"

          mkdir -p staging
          cp devshot/apps/agent/go/devshot-agent staging/
          cp devshot/apps/agent/run-mac-qemu.sh staging/
          cp devshot/apps/agent/sandbox/devshot-vmm-qemu.sb staging/
          cp Image-domu staging/
          cp devshot-guest-base.qcow2 staging/

          cd staging
          tar czf "../$TARBALL" .
          cd ..

          ls -lh "$TARBALL"
          SHA=$(shasum -a 256 "$TARBALL" | awk '{print $1}')
          echo "sha256=$SHA" >> $GITHUB_OUTPUT
          echo "tarball=$TARBALL" >> $GITHUB_OUTPUT
          echo "SHA256: $SHA"
        id: package

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.vars.outputs.version }}
          TARBALL=${{ steps.package.outputs.tarball }}

          # Delete existing release if re-running
          gh release delete "v${VERSION}" --yes 2>/dev/null || true
          git push origin ":refs/tags/v${VERSION}" 2>/dev/null || true

          gh release create "v${VERSION}" "$TARBALL" \
            --title "v${VERSION} — QEMU/HVF native Mac installer" \
            --notes "## DevShot native Mac installer

          Pool VMs run as direct QEMU/HVF subprocesses on Apple Silicon.
          Zero Docker, zero Xen nesting. Apple Hypervisor.framework provides
          hardware-accelerated virtualization.

          ### Install
          \`\`\`bash
          brew install devshotcom/tap/devshot
          \`\`\`

          ### Run
          \`\`\`bash
          DEVSHOT_SERVER_ID=<id> DEVSHOT_HMAC_SECRET=<secret> devshot run
          \`\`\`

          **SHA256**: \`${{ steps.package.outputs.sha256 }}\`

          Spec 038 — pluggable VMM backend."

      - name: Update Formula SHA256
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.vars.outputs.version }}
          SHA=${{ steps.package.outputs.sha256 }}

          # Update the sha256 and url in the Formula
          sed -i '' "s|sha256 \".*\"|sha256 \"${SHA}\"|" Formula/devshot.rb
          sed -i '' "s|url \".*\"|url \"https://github.com/devshotcom/homebrew-tap/releases/download/v${VERSION}/devshot-macos-arm64-qemu.tar.gz\"|" Formula/devshot.rb
          sed -i '' "s|version \".*\"|version \"${VERSION}\"|" Formula/devshot.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/devshot.rb
          git diff --cached --stat
          git commit -m "Update formula to v${VERSION} (SHA: ${SHA:0:12}...)" || echo "No changes"
          git push
