name: Build & Release Mac Installer

# Triggered on push to main (after monorepo deploy job syncs all files).
# Everything needed is already in the repo — no Docker pull, no extraction.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.2.0)'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4

      - name: Resolve version
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            VERSION=$(grep 'version "' Formula/devshot.rb | head -1 | sed 's/.*version "//;s/"//')
            echo "version=${VERSION:-0.0.0}" >> $GITHUB_OUTPUT
          fi

      - name: Verify all artifacts exist
        run: |
          echo "=== Agent binary ==="
          ls -lh bin/devshot-agent && file bin/devshot-agent
          echo "=== Boot artifacts ==="
          ls -lh boot/Image-domu boot/devshot-guest-base.qcow2
          echo "=== Scripts ==="
          ls -lh scripts/run-mac-qemu.sh scripts/sandbox/devshot-vmm-qemu.sb

      - name: Package tarball
        id: package
        run: |
          VERSION=${{ steps.vars.outputs.version }}
          TARBALL="devshot-macos-arm64-qemu.tar.gz"

          mkdir -p staging
          cp bin/devshot-agent                     staging/
          cp scripts/run-mac-qemu.sh               staging/
          cp scripts/sandbox/devshot-vmm-qemu.sb   staging/
          cp boot/Image-domu                       staging/
          cp boot/devshot-guest-base.qcow2         staging/
          chmod +x staging/run-mac-qemu.sh staging/devshot-agent

          cd staging && tar czf "../$TARBALL" . && cd ..

          SHA=$(shasum -a 256 "$TARBALL" | awk '{print $1}')
          echo "sha256=$SHA" >> $GITHUB_OUTPUT
          echo "tarball=$TARBALL" >> $GITHUB_OUTPUT
          echo "Version: $VERSION  SHA256: $SHA"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          VERSION=${{ steps.vars.outputs.version }}
          TARBALL=${{ steps.package.outputs.tarball }}

          gh release delete "v${VERSION}" --yes 2>/dev/null || true
          git push origin ":refs/tags/v${VERSION}" 2>/dev/null || true

          gh release create "v${VERSION}" "$TARBALL" \
            --title "v${VERSION} — QEMU/HVF native Mac installer" \
            --notes "## Install

          \`\`\`bash
          brew upgrade devshot  # or: brew install devshotcom/tap/devshot
          DEVSHOT_SERVER_ID=<id> DEVSHOT_HMAC_SECRET=<secret> devshot run
          \`\`\`

          **SHA256**: \`${{ steps.package.outputs.sha256 }}\`"

      - name: Update Formula SHA
        run: |
          VERSION=${{ steps.vars.outputs.version }}
          SHA=${{ steps.package.outputs.sha256 }}

          sed -i "s|sha256 \".*\"|sha256 \"${SHA}\"|" Formula/devshot.rb
          sed -i "s|url \".*\"|url \"https://github.com/devshotcom/homebrew-tap/releases/download/v${VERSION}/devshot-macos-arm64-qemu.tar.gz\"|" Formula/devshot.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/devshot.rb
          git diff --cached --quiet && echo "Formula unchanged" && exit 0
          git commit -m "Update formula to v${VERSION} (SHA: ${SHA:0:12})"
          git push
